name: Stale PRs and Issues

on:
  schedule:
    # Runs daily at 9:00 AM UTC
    - cron: "0 9 * * *"
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - name: Mark and close stale PRs and issues
        uses: actions/stale@v9
        with:
          days-before-stale: 60
          days-before-close: 7
          stale-issue-label: stale
          stale-pr-label: stale
          stale-issue-message: >
            This issue has been automatically marked as stale because it has not
            had any activity in the last 60 days. It will be closed in 7 days if
            no further activity occurs. If this issue is still relevant, please
            leave a comment to keep it open.
          stale-pr-message: >
            This pull request has been automatically marked as stale because it
            has not had any activity in the last 60 days. It will be closed in
            7 days if no further activity occurs. If this PR is still relevant,
            please leave a comment or push new changes to keep it open.
          close-issue-message: >
            This issue has been automatically closed due to inactivity. If you
            believe this issue is still relevant, please feel free to reopen it.
          close-pr-message: >
            This pull request has been automatically closed due to inactivity.
            If this PR is still relevant, please feel free to reopen it.
          exempt-issue-labels: pinned,do-not-close,security
          exempt-pr-labels: pinned,do-not-close,security
          remove-stale-when-updated: true
